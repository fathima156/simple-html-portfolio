<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add customer</title>
</head>
<body>
    <h1>CREATIVE TECH INTERLOCK</h1>
    
    <FIELDSET>
        <legend><h2>ADD A CUSTOMER</h2></legend>
        <form  title="Add a customer">
        <!--or <h1>ADD A CUSTOMER</h1>-->
        <label for="name">NAME:</label>
        <input placeholder="enter name" type="text" id="name" name="name">
        <br>
        <br>
        <label for="phone">PHONE NUMBER:</label>
        <input placeholder="enter phone no" type="text" id="phone" name="phone">
        <br>
        <br>
        <label for="place">PLACE:</label>
        <input placeholder="enter place" type="text" id="place" name="place">
        <br>
        <Br>
        <label for="interlock">INTERLOCK TYPE:</label>
        <input placeholder="enter interlock type" type="text" id="interlock" name="interlock">
        <br>
        <br>
        <label for="area">AREA:</label>
        <input placeholder="enter area" type="text" id="area" name="area">
        <br>
        <br>
        <label for="date">DATE:</label>
        <input placeholder="enter date" type="text" id="date" name="date">
        <br>
        <br>
        <label for="amount">AMOUNT:</label>
        <input placeholder="enter amount" type="text" id="amount" name="amount">
        <br>
        <br>
        <input type="submit" value="submit">
    </form></FIELDSET>
</body>
</html>
